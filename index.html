<!DOCTYPE html>
<html>

<head>

<title>Digital Journal</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🌸 My Digital Journal 🌸</h1>

<button class="darkBtn" onclick="toggleDark()">Toggle Dark Mode</button>

<br><br>

<div class="form">

<input id="title" placeholder="Title">

<input id="date" type="date">

<textarea id="content" placeholder="Write your thoughts..."></textarea>

<button onclick="addEntry()">Save Entry</button>

</div>

<br>

<input id="search" placeholder="Search entries..." onkeyup="searchEntry()">

<h3 id="count"></h3>

<h2>My Entries</h2>

<div id="entries"></div>

<script src="script.js"></script>

</body>

</html>
